{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="stats" id="stats-row">
  <div class="stat-card"><div class="stat-icon">🐛</div><div class="stat-label">Bugs đã xử lý</div><div class="stat-value" style="color:#4ade80" id="s-done">—</div></div>
  <div class="stat-card"><div class="stat-icon">📱</div><div class="stat-label">Groups đang monitor</div><div class="stat-value" style="color:#818cf8" id="s-groups">—</div></div>
  <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-label">Chờ phê duyệt</div><div class="stat-value" style="color:#facc15" id="s-pending">—</div></div>
  <div class="stat-card"><div class="stat-icon">🔀</div><div class="stat-label">PR đã tạo</div><div class="stat-value" style="color:#38bdf8" id="s-prs">—</div></div>
</div>

<div class="card">
  <div class="card-header">
    <span class="card-title">Bug analyses gần đây</span>
  </div>
  <table>
    <thead><tr><th>ID</th><th>Group</th><th>Tóm tắt</th><th>Repo</th><th>Trạng thái</th><th>Thời gian</th></tr></thead>
    <tbody id="analyses-tbody"><tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Đang tải...</td></tr></tbody>
  </table>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadDashboard() {
  const data = await GET('/api/status');
  if (!data) return;
  document.getElementById('s-done').textContent = data.bugs_done;
  document.getElementById('s-groups').textContent = data.groups_active;
  document.getElementById('s-pending').textContent = data.pending;
  document.getElementById('s-prs').textContent = data.prs_created;
  const tbody = document.getElementById('analyses-tbody');
  if (!data.recent_analyses || !data.recent_analyses.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Chưa có dữ liệu</td></tr>';
    return;
  }
  tbody.innerHTML = data.recent_analyses.map(a => `
    <tr>
      <td><strong style="color:var(--purple)">#${a.id}</strong></td>
      <td><span class="group-tag">${a.group_name}</span></td>
      <td>${a.claude_summary || '—'}</td>
      <td style="color:var(--text-muted)">${a.repo_name || '—'}</td>
      <td>${statusPill(a.status)}</td>
      <td style="color:var(--text-muted)">${a.created_at ? a.created_at.slice(0,16) : '—'}</td>
    </tr>`).join('');
}
document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
{% endblock %}
