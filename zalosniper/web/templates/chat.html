{% extends "base.html" %}
{% block title %}Lịch sử chat{% endblock %}
{% block content %}
<style>
  .chat-layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: calc(100vh - 120px); margin: -28px -32px; }

  /* ── Group list (left panel) ── */
  .chat-sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .chat-sidebar-header { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .chat-sidebar-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .chat-search { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
                 padding: 7px 14px; font-size: 13px; color: var(--text); width: 100%; outline: none; }
  .chat-search::placeholder { color: var(--text-muted); }
  .group-list { flex: 1; overflow-y: auto; }
  .group-item { display: flex; align-items: center; gap: 12px; padding: 12px 18px;
                cursor: pointer; border-bottom: 1px solid var(--surface2); transition: background .1s; }
  .group-item:hover { background: var(--surface2); }
  .group-item.active { background: #1e1b4b; }
  [data-theme="light"] .group-item.active { background: #eef2ff; }
  .group-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6);
                  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .group-info { flex: 1; min-width: 0; }
  .group-item-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap;
                     overflow: hidden; text-overflow: ellipsis; }
  .group-item-preview { font-size: 11px; color: var(--text-muted); margin-top: 2px;
                        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .group-badge { background: var(--primary); color: white; border-radius: 10px; font-size: 10px;
                 font-weight: 700; padding: 2px 7px; min-width: 18px; text-align: center; flex-shrink: 0; }

  /* ── Chat panel (right) ── */
  .chat-panel { display: flex; flex-direction: column; background: var(--bg); }
  .chat-topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px;
                 display: flex; align-items: center; gap: 12px; }
  .chat-topbar-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,#6366f1,#8b5cf6);
                        display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .chat-topbar-info { flex: 1; }
  .chat-topbar-name { font-size: 14px; font-weight: 700; }
  .chat-topbar-sub { font-size: 11px; color: var(--text-muted); }
  .chat-topbar-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Days filter ── */
  .days-filter { display: flex; gap: 4px; }
  .days-btn { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
              border: 1px solid var(--border); background: transparent; cursor: pointer;
              color: var(--text-sub); transition: all .15s; }
  .days-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* ── Messages area ── */
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 2px; }
  .chat-empty { display: flex; align-items: center; justify-content: center; flex: 1;
                color: var(--text-muted); flex-direction: column; gap: 12px; }
  .chat-empty .big-icon { font-size: 48px; opacity: .4; }

  /* ── Date divider ── */
  .date-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0 8px; }
  .date-divider span { font-size: 11px; color: var(--text-muted); font-weight: 600; white-space: nowrap;
                       background: var(--bg); padding: 0 8px; }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Message bubble ── */
  .msg-group { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
  .msg-group.me { flex-direction: row-reverse; }
  .msg-sender-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
                       justify-content: center; font-size: 13px; font-weight: 700; color: white;
                       flex-shrink: 0; align-self: flex-start; margin-top: 4px; }
  .msg-col { display: flex; flex-direction: column; gap: 2px; max-width: 60%; }
  .msg-group.me .msg-col { align-items: flex-end; }
  .msg-sender-name { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 2px; padding: 0 4px; }
  .msg-bubble { padding: 9px 13px; border-radius: 18px; font-size: 13px; line-height: 1.5;
                word-break: break-word; position: relative; max-width: 100%; }
  .msg-bubble.other { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 18px 18px 18px; color: var(--text); }
  .msg-bubble.me-bubble { background: var(--primary); color: white; border-radius: 18px 4px 18px 18px; }
  .msg-meta { display: flex; align-items: center; gap: 5px; padding: 0 4px; }
  .msg-time { font-size: 10px; color: var(--text-muted); }
  .msg-processed { font-size: 10px; color: var(--green); }

  /* Scrollbar */
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

<div class="chat-layout">
  <!-- Left: group list -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <div class="chat-sidebar-title">💬 Nhóm Zalo</div>
      <input type="text" class="chat-search" placeholder="🔍 Tìm nhóm..." id="group-search" oninput="filterGroups()">
    </div>
    <div class="group-list" id="group-list">
      <div style="padding:20px;text-align:center;color:var(--text-muted)">Đang tải...</div>
    </div>
  </div>

  <!-- Right: chat panel -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty">
      <div class="big-icon">💬</div>
      <div style="font-size:15px;font-weight:600">Chọn nhóm để xem lịch sử</div>
      <div style="font-size:13px;color:var(--text-muted)">Các tin nhắn sẽ hiển thị ở đây</div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let allGroups = [];
let currentGroup = null;
let currentDays = 7;

// ── Palette for sender avatars ──
const COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6','#f97316','#84cc16'];
const senderColor = (() => {
  const map = {};
  let i = 0;
  return name => { if (!map[name]) map[name] = COLORS[i++ % COLORS.length]; return map[name]; };
})();

function initials(name) {
  return (name || '?').split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

// ── Load group list ──
async function loadGroups() {
  const data = await GET('/api/chat') || [];
  allGroups = data;
  renderGroupList(allGroups);
}

function renderGroupList(groups) {
  const el = document.getElementById('group-list');
  if (!groups.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">Chưa có nhóm nào</div>';
    return;
  }
  el.innerHTML = groups.map(g => `
    <div class="group-item ${currentGroup === g.group_name ? 'active' : ''}"
         id="gi-${CSS.escape(g.group_name)}" onclick="openGroup('${g.group_name.replace(/'/g, "\\'")}')">
      <div class="group-avatar" style="background:linear-gradient(135deg,${senderColor(g.group_name)},${senderColor(g.group_name+'x')})">
        ${initials(g.group_name)}
      </div>
      <div class="group-info">
        <div class="group-item-name">${g.group_name}</div>
        <div class="group-item-preview">${g.enabled ? '🟢 Đang theo dõi' : '⏸ Tạm dừng'}</div>
      </div>
    </div>`).join('');
}

function filterGroups() {
  const q = document.getElementById('group-search').value.toLowerCase();
  renderGroupList(q ? allGroups.filter(g => g.group_name.toLowerCase().includes(q)) : allGroups);
}

// ── Open group chat ──
async function openGroup(name, days) {
  currentGroup = name;
  currentDays = days || currentDays;

  // Highlight active group
  document.querySelectorAll('.group-item').forEach(el => el.classList.remove('active'));
  const gi = document.getElementById(`gi-${CSS.escape(name)}`);
  if (gi) gi.classList.add('active');

  const panel = document.getElementById('chat-panel');
  const color = senderColor(name);
  panel.innerHTML = `
    <div class="chat-topbar">
      <div class="chat-topbar-avatar" style="background:linear-gradient(135deg,${color},${senderColor(name+'x')})">${initials(name)}</div>
      <div class="chat-topbar-info">
        <div class="chat-topbar-name">${name}</div>
        <div class="chat-topbar-sub" id="msg-count">Đang tải...</div>
      </div>
      <div class="chat-topbar-actions">
        <div class="days-filter">
          ${[1,3,7,14,30].map(d => `<button class="days-btn ${currentDays===d?'active':''}" onclick="openGroup('${name.replace(/'/g,"\\'")}',${d})">${d}d</button>`).join('')}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openGroup('${name.replace(/'/g,"\\'")}')">🔄</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div style="text-align:center;padding:40px;color:var(--text-muted)">Đang tải...</div>
    </div>`;

  const msgs = await GET(`/api/chat/${encodeURIComponent(name)}?days=${currentDays}&limit=500`);
  if (!msgs) return;

  document.getElementById('msg-count').textContent = `${msgs.length} tin nhắn — ${currentDays} ngày gần đây`;

  const container = document.getElementById('chat-messages');
  if (!msgs.length) {
    container.innerHTML = `<div class="chat-empty"><div class="big-icon">📭</div><div>Chưa có tin nhắn nào</div></div>`;
    return;
  }

  // Group by date
  let lastDate = null;
  let html = '';
  let lastSender = null;
  for (const m of msgs) {
    const dt = m.timestamp ? m.timestamp.split(' ')[0] : '—';
    const time = m.timestamp ? m.timestamp.split(' ')[1]?.slice(0,5) : '';
    const isMe = m.sender === 'me';
    const displayName = isMe ? 'Tôi' : m.sender;

    if (dt !== lastDate) {
      lastDate = dt;
      const label = formatDateLabel(dt);
      html += `<div class="date-divider"><span>${label}</span></div>`;
      lastSender = null;
    }

    const showName = m.sender !== lastSender;
    lastSender = m.sender;
    const color = isMe ? '#6366f1' : senderColor(m.sender);
    const processedMark = m.processed ? ' <span class="msg-processed">✓ đã xử lý</span>' : '';

    html += `
      <div class="msg-group${isMe ? ' me' : ''}">
        <div class="msg-sender-avatar" style="background:${color};${showName ? '' : 'visibility:hidden'}">
          ${initials(displayName)}
        </div>
        <div class="msg-col">
          ${showName ? `<div class="msg-sender-name" style="color:${color}">${escHtml(displayName)}</div>` : ''}
          <div class="msg-bubble ${isMe ? 'me-bubble' : 'other'}">${escHtml(m.content)}</div>
          <div class="msg-meta"><span class="msg-time">${time}</span>${processedMark}</div>
        </div>
      </div>`;
  }

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function formatDateLabel(dateStr) {
  if (!dateStr || dateStr === '—') return dateStr;
  const d = new Date(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d >= today) return 'Hôm nay';
  if (d >= yesterday) return 'Hôm qua';
  return d.toLocaleDateString('vi-VN', {weekday:'long', day:'numeric', month:'long'});
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

document.addEventListener('DOMContentLoaded', loadGroups);
</script>
{% endblock %}
