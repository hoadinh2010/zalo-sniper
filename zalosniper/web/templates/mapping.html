{% extends "base.html" %}
{% block title %}Group Mapping{% endblock %}
{% block content %}
<div id="mapping-container"></div>
{% endblock %}
{% block scripts %}
<script>
async function loadMapping() {
  const groups = await GET('/api/groups') || [];
  const container = document.getElementById('mapping-container');
  if (!groups.length) {
    container.innerHTML = '<p style="color:var(--text-muted)">Chưa có group nào. <a href="/groups" style="color:var(--primary)">Thêm group</a> trước.</p>';
    return;
  }
  const html = await Promise.all(groups.map(async g => {
    const repos = await GET(`/api/groups/${g.id}/repos`) || [];
    const op = await GET(`/api/groups/${g.id}/openproject`) || {};
    return `
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <span class="card-title"><span class="group-tag">${g.group_name}</span> — GitHub Repos</span>
          <button class="btn btn-primary btn-sm" onclick="openAddRepo(${g.id})">+ Thêm repo</button>
        </div>
        <table>
          <thead><tr><th>Owner/Repo</th><th>Branch</th><th>Mô tả</th><th></th></tr></thead>
          <tbody id="repos-${g.id}">
            ${repos.length ? repos.map(r => `
              <tr>
                <td><code>${r.owner}/${r.repo_name}</code></td>
                <td>${r.branch}</td>
                <td style="color:var(--text-muted)">${r.description || '—'}</td>
                <td><button class="action-btn" onclick="deleteRepo(${g.id},${r.id},'${r.repo_name}')">🗑</button></td>
              </tr>`).join('') : '<tr><td colspan="4" style="color:var(--text-muted)">Chưa có repo</td></tr>'}
          </tbody>
        </table>
        <div class="card-header" style="border-top:1px solid var(--border);border-bottom:none;margin-top:0">
          <span class="card-title">OpenProject</span>
        </div>
        <div style="padding:20px;display:grid;gap:12px" id="op-${g.id}">
          <div class="form-group">
            <label class="form-label">URL</label>
            <input type="text" class="form-control" id="op-url-${g.id}" value="${op.op_url||''}" placeholder="https://openproject.example.com">
          </div>
          <div class="form-group">
            <label class="form-label">API Key</label>
            <input type="password" class="form-control" id="op-key-${g.id}" value="${op.op_api_key||''}" placeholder="••••">
          </div>
          <div class="form-group">
            <label class="form-label">Project ID / Slug</label>
            <input type="text" class="form-control" id="op-proj-${g.id}" value="${op.op_project_id||''}" placeholder="my-project">
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-primary btn-sm" onclick="saveOP(${g.id})">💾 Lưu OpenProject</button>
            <button class="btn btn-ghost btn-sm" onclick="testOP(${g.id})">🔍 Test kết nối</button>
            <span id="op-status-${g.id}" style="font-size:12px"></span>
          </div>
        </div>
        <div class="card-header" style="border-top:1px solid var(--border);border-bottom:none;margin-top:0">
          <span class="card-title">Auto-assign Rules</span>
          <button class="btn btn-primary btn-sm" onclick="addRule(${g.id})">+ Thêm rule</button>
        </div>
        <div style="padding:0 20px 20px" id="rules-${g.id}"><p style="color:var(--text-muted);font-size:12px">Đang tải...</p></div>
      </div>
      <div class="modal-overlay" id="add-repo-modal-${g.id}">
        <div class="modal">
          <div class="modal-title">Thêm GitHub Repo cho "${g.group_name}"</div>
          <!-- Step 1: GitHub connect (shown if no token) -->
          <div id="gh-connect-${g.id}" style="display:none">
            <div style="text-align:center;padding:16px 0">
              <div style="font-size:40px;margin-bottom:12px">🔗</div>
              <div style="font-size:14px;font-weight:600;margin-bottom:8px">Kết nối GitHub</div>
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">
                Nhập <a href="https://github.com/settings/tokens/new?scopes=repo&description=ZaloSniper" target="_blank" style="color:var(--primary)">Personal Access Token</a> để tìm repo
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">GitHub Token</label>
              <input type="password" id="gh-token-${g.id}" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
            </div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="document.getElementById('add-repo-modal-${g.id}').classList.remove('open')">Hủy</button>
              <button class="btn btn-primary" onclick="connectGitHub(${g.id})">🔗 Kết nối</button>
            </div>
          </div>
          <!-- Step 2: Repo search (shown if token exists) -->
          <div id="gh-search-${g.id}" style="display:none">
            <div class="form-group">
              <label class="form-label">Tìm repo từ GitHub</label>
              <div class="input-group">
                <input type="text" id="r-search-${g.id}" class="form-control" placeholder="Tìm theo tên repo..." oninput="searchRepos(${g.id})">
                <button class="btn btn-ghost btn-sm" onclick="searchRepos(${g.id})">🔍</button>
              </div>
              <div id="r-results-${g.id}" style="margin-top:8px;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;display:none"></div>
            </div>
            <div class="form-group"><label class="form-label">Owner</label><input type="text" id="r-owner-${g.id}" class="form-control" placeholder="myorg"></div>
            <div class="form-group"><label class="form-label">Repo Name</label><input type="text" id="r-name-${g.id}" class="form-control" placeholder="backend"></div>
            <div class="form-group"><label class="form-label">Branch</label><input type="text" id="r-branch-${g.id}" class="form-control" placeholder="main" value="main"></div>
            <div class="form-group"><label class="form-label">Mô tả</label><input type="text" id="r-desc-${g.id}" class="form-control" placeholder="Backend API"></div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="document.getElementById('add-repo-modal-${g.id}').classList.remove('open')">Hủy</button>
              <button class="btn btn-primary" onclick="addRepo(${g.id})">Thêm</button>
            </div>
          </div>
        </div>
      </div>`;
  }));
  container.innerHTML = html.join('');
  // Load assignment rules for each group
  groups.forEach(g => loadRules(g.id));
}

let _ghConnected = null; // cached GitHub connection status
let _repoCache = null;
let _repoSearchTimer = null;

async function checkGitHubConnection() {
  if (_ghConnected !== null) return _ghConnected;
  const settings = await GET('/api/settings');
  // Masked token looks like "****xxxx", unset is empty or absent
  const token = settings?.github_token || '';
  _ghConnected = token.length > 0 && token !== '';
  return _ghConnected;
}

async function openAddRepo(gid) {
  document.getElementById(`add-repo-modal-${gid}`).classList.add('open');
  const connected = await checkGitHubConnection();
  document.getElementById(`gh-connect-${gid}`).style.display = connected ? 'none' : 'block';
  document.getElementById(`gh-search-${gid}`).style.display = connected ? 'block' : 'none';
  if (connected) searchRepos(gid);
}

async function connectGitHub(gid) {
  const token = document.getElementById(`gh-token-${gid}`).value.trim();
  if (!token) { toast('Vui lòng nhập GitHub token', 'error'); return; }

  // Test the token first
  const testResp = await fetch('/api/github/repos?test_token=' + encodeURIComponent(token), {
    headers: {'Content-Type': 'application/json'},
    credentials: 'same-origin'
  });
  const testData = await testResp.json();
  if (testData.error) {
    toast('Token không hợp lệ: ' + testData.error, 'error');
    return;
  }

  // Save token to settings
  const resp = await POST('/api/settings', { github_token: token });
  if (!resp?.ok) { toast('Lỗi lưu token', 'error'); return; }

  toast('Đã kết nối GitHub!');
  _ghConnected = true;
  _repoCache = testData; // use already-fetched repos
  document.getElementById(`gh-connect-${gid}`).style.display = 'none';
  document.getElementById(`gh-search-${gid}`).style.display = 'block';
  searchRepos(gid);
}

async function searchRepos(gid) {
  clearTimeout(_repoSearchTimer);
  _repoSearchTimer = setTimeout(async () => {
    const q = document.getElementById(`r-search-${gid}`).value.trim();
    const resultsEl = document.getElementById(`r-results-${gid}`);
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = '<div style="padding:10px;color:var(--text-muted)">Đang tải...</div>';

    if (!_repoCache) {
      const data = await GET('/api/github/repos');
      if (!data || data.error) {
        resultsEl.innerHTML = `<div style="padding:10px;color:var(--red)">${data?.error || 'Lỗi tải repo'}</div>`;
        // If token is invalid, show connect form
        if (data?.error?.includes('401') || data?.error?.includes('token')) {
          _ghConnected = false;
          document.getElementById(`gh-connect-${gid}`).style.display = 'block';
          document.getElementById(`gh-search-${gid}`).style.display = 'none';
        }
        return;
      }
      _repoCache = data;
    }

    const filtered = q
      ? _repoCache.filter(r => r.full_name.toLowerCase().includes(q.toLowerCase()))
      : _repoCache;

    if (!filtered.length) {
      resultsEl.innerHTML = '<div style="padding:10px;color:var(--text-muted)">Không tìm thấy repo</div>';
      return;
    }

    resultsEl.innerHTML = filtered.slice(0, 30).map(r => `
      <div style="padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--surface2);font-size:13px"
           onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''"
           onclick="selectRepo(${gid},'${r.owner}','${r.repo_name}','${r.default_branch}')">
        <strong>${r.full_name}</strong>
        <span style="color:var(--text-muted);margin-left:8px;font-size:11px">${r.default_branch}</span>
      </div>`).join('');
  }, 300);
}

function selectRepo(gid, owner, name, branch) {
  document.getElementById(`r-owner-${gid}`).value = owner;
  document.getElementById(`r-name-${gid}`).value = name;
  document.getElementById(`r-branch-${gid}`).value = branch;
  document.getElementById(`r-results-${gid}`).style.display = 'none';
  document.getElementById(`r-search-${gid}`).value = `${owner}/${name}`;
}

async function addRepo(gid) {
  const owner = document.getElementById(`r-owner-${gid}`).value.trim();
  const name = document.getElementById(`r-name-${gid}`).value.trim();
  const branch = document.getElementById(`r-branch-${gid}`).value.trim() || 'main';
  const desc = document.getElementById(`r-desc-${gid}`).value.trim();
  if (!owner || !name) { toast('Owner và Repo Name là bắt buộc', 'error'); return; }
  const resp = await POST(`/api/groups/${gid}/repos`, {owner, repo_name: name, branch, description: desc});
  if (resp?.id) { toast('Đã thêm repo!'); document.getElementById(`add-repo-modal-${gid}`).classList.remove('open'); loadMapping(); }
  else toast('Lỗi khi thêm repo', 'error');
}

async function deleteRepo(gid, rid, name) {
  if (!confirm_action(`Xóa repo "${name}"?`)) return;
  const resp = await DELETE(`/api/groups/${gid}/repos/${rid}`);
  if (resp?.ok) { toast(`Đã xóa repo "${name}"`); loadMapping(); }
}

async function saveOP(gid) {
  const body = {
    op_url: document.getElementById(`op-url-${gid}`).value,
    op_api_key: document.getElementById(`op-key-${gid}`).value,
    op_project_id: document.getElementById(`op-proj-${gid}`).value,
  };
  const resp = await PUT(`/api/groups/${gid}/openproject`, body);
  if (resp?.ok) toast('Đã lưu OpenProject!');
  else toast('Lỗi khi lưu', 'error');
}

async function loadRules(gid) {
  const rules = await GET(`/api/groups/${gid}/assignment-rules`) || [];
  const el = document.getElementById(`rules-${gid}`);
  if (!el) return;
  if (!rules.length) {
    el.innerHTML = '<p style="color:var(--text-muted);font-size:12px">Chưa có rule — Bug sẽ không tự gán người xử lý</p>';
    return;
  }
  el.innerHTML = '<table style="width:100%"><thead><tr><th>Keyword</th><th>Assignee</th><th>OP User ID</th><th></th></tr></thead><tbody>' +
    rules.map(r => `<tr>
      <td><code>${r.keyword_pattern}</code></td>
      <td>${r.op_assignee_name || '—'}</td>
      <td style="color:var(--text-muted)">${r.op_assignee_id || '—'}</td>
      <td><button class="action-btn" onclick="deleteRule(${r.id},${gid})">🗑</button></td>
    </tr>`).join('') + '</tbody></table>';
}

async function addRule(gid) {
  const keyword = prompt('Keyword pattern (ví dụ: thanh toán, QR code):');
  if (!keyword) return;
  const name = prompt('Tên người xử lý:') || '';
  const opId = prompt('OpenProject User ID (số):') || '0';
  const resp = await POST(`/api/groups/${gid}/assignment-rules`, {
    keyword_pattern: keyword, op_assignee_name: name, op_assignee_id: parseInt(opId)
  });
  if (resp?.id) { toast('Đã thêm rule!'); loadRules(gid); }
}

async function deleteRule(rid, gid) {
  if (!confirm_action('Xóa rule này?')) return;
  const resp = await DELETE(`/api/assignment-rules/${rid}`);
  if (resp?.ok) loadRules(gid);
}

async function testOP(gid) {
  const statusEl = document.getElementById(`op-status-${gid}`);
  statusEl.innerHTML = '<span style="color:var(--text-muted)">Đang kiểm tra...</span>';
  const body = {
    op_url: document.getElementById(`op-url-${gid}`).value,
    op_api_key: document.getElementById(`op-key-${gid}`).value,
    op_project_id: document.getElementById(`op-proj-${gid}`).value,
  };
  const resp = await POST(`/api/groups/${gid}/openproject/test`, body);
  if (resp && resp.ok) {
    statusEl.innerHTML = `<span style="color:var(--green)">● ${resp.project_name}</span>`;
  } else {
    statusEl.innerHTML = `<span style="color:var(--red)">● ${resp?.error || 'Lỗi kết nối'}</span>`;
  }
}

document.addEventListener('DOMContentLoaded', loadMapping);
</script>
{% endblock %}
